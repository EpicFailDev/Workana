            :results-initials='{&quot;resultDescription&quot;:{&quot;count&quot;:10000,&quot;showResultCount&quot;:false,&quot;emptyResultLabel&quot;:&quot;N\u00e3o foram encontrados projetos compat\u00edveis com os crit\u00e9rios de sua busca&quot;,&quot;notEmptyResultLabel&quot;:&quot;10000 resultados encontrados&quot;},&quot;results&quot;:[{&quot;slug&quot;:&quot;desenvolvedor-full-stack-python-odoo-para-automacao-juridica-scraping-tribunais-drive-e-whatsapp&quot;,&quot;title&quot;:&quot;\u003Ca href=\u0022\/job\/desenvolvedor-full-stack-python-odoo-para-automacao-juridica-scraping-tribunais-drive-e-whatsapp?ref=projects_3\u0022 target=\u0022_blank\u0022 rel=\u0022noopener\u0022\u003E\u003Cspan title=\u0022Desenvolvedor Full Stack Python\/Odoo para Automa\u00e7\u00e3o Jur\u00eddica (Scraping Tribunais, Drive e Whatsapp)\u0022\u003EDesenvolvedor Full Stack Python\/Odoo para Automa\u00e7\u00e3o Jur\u00eddica (Scrap...\u003C\/span\u003E\u003C\/a\u003E&quot;,&quot;url&quot;:&quot;#&quot;,&quot;authorName&quot;:&quot;C. L. R.&quot;,&quot;description&quot;:&quot;Estamos buscando um desenvolvedor Full Stack com forte experi\u00eancia em Backend Python e no Framework Odoo para criar um m\u00f3dulo customizado chamado \u0026quot;OSINT Target\u0026quot;. O objetivo principal deste projeto \u00e9 automatizar o monitoramento de processos judiciais e administrativos. O sistema dever\u00e1 ser capaz de acessar e ler informa\u00e7\u00f5es de sites de tribunais, baixar documentos relevantes e, em seguida, integrar e atualizar automaticamente nosso sistema ERP Odoo.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nEscopo T\u00e9cnico Detalhado:\u003Cbr\/\u003E\n\u003Cbr\/\u003E\n1.\u0026nbsp; M\u00f3dulo Odoo (Backend): Ser\u00e1 necess\u00e1rio desenvolver um m\u00f3dulo Odoo customizado. Este m\u00f3dulo permitir\u00e1 o cadastro de novos processos, a vincula\u00e7\u00e3o desses processos a uma Ordem de Servi\u00e7o existente, a uma Tarefa (Task) espec\u00edfica e a uma Pasta do Google Drive designada para cada processo.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\n2.\u0026nbsp; Rob\u00f4 (Crawler): O projeto inclui a cria\u00e7\u00e3o de um script em Python que funcionar\u00e1 como um rob\u00f4 (crawler). Este rob\u00f4 utilizar\u00e1 bibliotecas como Playwright ou Selenium para acessar diversos portais de tribunais (ex: PJe, e-SAJ). Ele dever\u00e1 ser capaz de resolver Captchas e identificar e coletar novas informa\u00e7\u00f5es ou atualiza\u00e7\u00f5es nos processos monitorados.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\n3.\u0026nbsp; Integra\u00e7\u00f5es Essenciais:\u003Cbr\/\u003E\n\u0026nbsp; \u0026nbsp; *\u0026nbsp;  Google Drive: O sistema dever\u00e1 salvar automaticamente os documentos em formato PDF baixados dos tribunais na pasta espec\u00edfica do Google Drive que foi informada durante o cadastro do processo no Odoo.\u003Cbr\/\u003E\n\u0026nbsp; \u0026nbsp; *\u0026nbsp;  Odoo: Todas as atualiza\u00e7\u00f5es e andamentos dos processos dever\u00e3o ser postados no Chatter da Tarefa vinculada dentro do Odoo, garantindo um registro claro e acess\u00edvel.\u003Cbr\/\u003E\n\u0026nbsp; \u0026nbsp; *\u0026nbsp;  WhatsApp: O rob\u00f4 dever\u00e1 enviar notifica\u00e7\u00f5es para Comunidades espec\u00edficas (interna e do cliente) via API (utilizando Evolution ou Z-API) sempre que houver uma nova atualiza\u00e7\u00e3o ou documento importante.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\n4.\u0026nbsp; Arquitetura: O c\u00f3digo e a arquitetura do sistema devem ser desenvolvidos com foco em Multi-tenancy, garantindo a seguran\u00e7a e o isolamento dos dados por cliente. Esta abordagem \u00e9 crucial para futuras expans\u00f5es e a transforma\u00e7\u00e3o do projeto em um modelo SaaS (Software as a Service).\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nRequisitos Indispens\u00e1veis:\u003Cbr\/\u003E\n*\u0026nbsp;  Experi\u00eancia comprovada na cria\u00e7\u00e3o e customiza\u00e7\u00e3o de m\u00f3dulos para o Framework Odoo.\u003Cbr\/\u003E\n*\u0026nbsp;  Profici\u00eancia e experi\ escription&quot;:&quot;Estamos buscando um desenvolvedor para criar um agente automatizado robusto utilizando n8n, com o objetivo de processar e otimizar imagens enviadas por usu\u00e1rios atrav\u00e9s de um site constru\u00eddo na plataforma Lovable. O foco principal \u00e9 aprimorar a qualidade visual das imagens para redes sociais, garantindo que o produto original n\u00e3o seja alterado em suas caracter\u00edsticas essenciais como formato, cor ou textura.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nO problema que este projeto visa resolver \u00e9 a dificuldade de usu\u00e1rios comuns em editar imagens profissionalmente, a complexidade de ferramentas como Photoshop e a imprecis\u00e3o de aplicativos autom\u00e1ticos que frequentemente alteram o produto. Criadores de conte\u00fado, empresas e pol\u00edticos necessitam de imagens prontas para postagem em redes sociais, e a solu\u00e7\u00e3o proposta \u00e9 um agente inteligente que compreende a inten\u00e7\u00e3o do usu\u00e1rio e entrega uma imagem otimizada.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nA experi\u00eancia do usu\u00e1rio ser\u00e1 simplificada no site Lovable: o usu\u00e1rio far\u00e1 o upload da imagem, escolher\u00e1 ou descrever\u00e1 o tipo de fundo desejado (branco, neutro, ambiente, gradiente, cen\u00e1rio) e o estilo (Instagram, feed profissional, an\u00fancio, institucional), clicar\u00e1 em \u0026quot;Transformar imagem\u0026quot; e receber\u00e1 a vers\u00e3o editada para download ou postagem.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nEm termos de arquitetura, o projeto envolver\u00e1:\u003Cbr\/\u003E\n- Frontend: Desenvolvido na plataforma Lovable.\u003Cbr\/\u003E\n- Backend de automa\u00e7\u00e3o: Orquestrado pelo n8n.\u003Cbr\/\u003E\n- IA de edi\u00e7\u00e3o de imagem: Utiliza\u00e7\u00e3o de APIs de IA para remo\u00e7\u00e3o e substitui\u00e7\u00e3o de fundo, upscale (aumento de qualidade) e ajuste de luz, nitidez e contraste.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nO papel do n8n ser\u00e1 crucial como o c\u00e9rebro orquestrador. O agente no n8n ser\u00e1 respons\u00e1vel por:\u003Cbr\/\u003E\n- Receber a imagem do Lovable via Webhook.\u003Cbr\/\u003E\n- Interpretar o pedido do usu\u00e1rio (seja por texto ou op\u00e7\u00f5es pr\u00e9-definidas).\u003Cbr\/\u003E\n- Encaminhar a imagem para as APIs de IA especializadas.\u003Cbr\/\u003E\n- Garantir que o produto na imagem n\u00e3o seja alterado, focando apenas na otimiza\u00e7\u00e3o do fundo e da qualidade visual.\u003Cbr\/\u003E\n- Retornar a imagem final e processada de volta para o site Lovable.\u003Cbr \/\u003E\u003Cbr \/\u003E\u003Cstrong\u003ECategoria\u003C\/strong\u003E: TI e Programa\u00e7\u00e3o\u003Cbr \/\u003E\u003Cstrong\u003ESubcategoria\u003C\/strong\u003E: Programa\u00e7\u00e3o\u003Cbr \/\u003E\u003Cstrong\u003EQual \u00e9 o alcance do projeto?\u003C\/strong\u003E: Criar um novo site personalizado\u003Cbr \/\u003E&quot;,&quot;isHourly&quot;:false,&quot;deadline&quot;:null,&quot;deadlineValue&quot;:&quot;&quot;,&quot;isSearchFeatured&quot;:false,&quot;postedDate&quot;:&quot;h\u00e1 2 dias&quot;,&quot;lastEmployerMessage&quot;:&quot;h\u00e1 6 horas&quot;,&quot;isUrgent&quot;:false,&quot;projectClientPlanLabel&quot;:null,&quot;showMainDetails&quot;:true,&quot;showDescription&quot;:true,&quot;showSkills&quot;:true,&quot;skills&quot;:[{&quot;anchorText&quot;:&quot;API&quot;,&quot;anchorLink&quot;:&quot;https:\/\/www.workana.com\/jobs?skills=api&quot;,&quot;isCertified&quot;:false,&quot;title&quot;:&quot;Trabalhos freelancer de API&quot;},{&quot;anchorText&quot;:&quot;REST API&quot;,&quot;anchorLink&quot;:&quot;https:\/\/www.workana.com\/jobs?skills=rest-api&quot;,&quot;isCertified&quot;:false,&quot;title&quot;:&quot;Trabalhos freelancer de REST API&quot;},{&quot;anchorText&quot;:&quot;JavaScript&quot;,&quot;anchorLink&quot;:&quot;https:\/\/www.workana.com\/jobs?skills=javascript&quot;,&quot;isCertified&quot;:false,&quot;title&quot;:&quot;Trabalhos freelancer de JavaScript&quot;},{&quot;anchorText&quot;:&quot;Pyt text-underline skyblue\u0022 rel=\u0022nofollow\u0022\u003Efa\u00e7a seu login na Workana\u003C\/a\u003E.\u003C\/p\u003E&quot;},{&quot;slug&quot;:&quot;desenvolvedor-para-integracao-meta-conversions-api-capi-via-webhook-notifique&quot;,&quot;title&quot;:&quot;\u003Ca href=\u0022\/job\/desenvolvedor-para-integracao-meta-conversions-api-capi-via-webhook-notifique?ref=projects_3\u0022 target=\u0022_blank\u0022 rel=\u0022noopener\u0022\u003E\u003Cspan title=\u0022Desenvolvedor para Integra\u00e7\u00e3o Meta Conversions Api (Capi) via Webhook Notifique\u0022\u003EDesenvolvedor para Integra\u00e7\u00e3o Meta Conversions Api (Capi) via Webho...\u003C\/span\u003E\u003C\/a\u003E&quot;,&quot;url&quot;:&quot;#&quot;,&quot;authorName&quot;:&quot;\u00c1. S.&quot;,&quot;description&quot;:&quot;Estamos buscando um desenvolvedor experiente para implementar uma integra\u00e7\u00e3o crucial para nossas vendas de IPTV. O objetivo principal \u00e9 configurar a Meta Conversions api (capi) para rastrear eventos de compra de forma precisa, utilizando webhooks do nosso gestor de pagamentos, notifique.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nCen\u00e1rio Atual:\u003Cbr\/\u003E\n- Nossas vendas s\u00e3o de produtos IPTV.\u003Cbr\/\u003E\n- O tr\u00e1fego para nossos produtos vem de an\u00fancios do Meta direcionados para o WhatsApp (via BotConversa).\u003Cbr\/\u003E\n- Utilizamos o Notifique como nosso gestor de pagamentos, e ele j\u00e1 possui um webhook de retorno ativo.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nObjetivo do Projeto:\u003Cbr\/\u003E\nQuando um pagamento for aprovado no Notifique, o webhook correspondente deve chamar um endpoint que ser\u00e1 desenvolvido. Este endpoint ser\u00e1 respons\u00e1vel por enviar automaticamente um evento de convers\u00e3o para o Meta (Facebook) via Conversions API, garantindo a correta atribui\u00e7\u00e3o e otimiza\u00e7\u00e3o de campanhas.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nRequisitos T\u00e9cnicos:\u003Cbr\/\u003E\n- Criar um endpoint (URL) robusto e seguro para receber os dados do webhook do Notifique.\u003Cbr\/\u003E\n- Implementar a l\u00f3gica para processar exclusivamente eventos de pagamento aprovado recebidos do Notifique.\u003Cbr\/\u003E\n- Enviar o evento de convers\u00e3o \u0026quot;Purchase\u0026quot; ou \u0026quot;Subscribe\u0026quot; para a Meta (CAPI).\u003Cbr\/\u003E\n- Incluir o \u0026quot;event_id\u0026quot; (ID da transa\u00e7\u00e3o) no evento para garantir a deduplica\u00e7\u00e3o de eventos, evitando contagens duplicadas.\u003Cbr\/\u003E\n- Transmitir o valor da transa\u00e7\u00e3o e a moeda (BRL) corretamente.\u003Cbr\/\u003E\n- Enviar dados do usu\u00e1rio (\u0026quot;user_data\u0026quot;), como telefone e\/ou e-mail, com hash, se dispon\u00edveis no webhook do Notifique, para melhorar a correspond\u00eancia de eventos.\u003Cbr\/\u003E\n- O endpoint deve retornar um status HTTP 200 para o Notifique ap\u00f3s o processamento bem-sucedido do webhook.\u003Cbr\/\u003E\n- Realizar testes completos do evento no Gerenciador de Eventos da Meta (se\u00e7\u00e3o \u0026quot;Test Events\u0026quot;) para validar a integra\u00e7\u00e3o.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\nEntreg\u00e1veis:\u003Cbr\/\u003E\n- O endpoint completamente funcional e pronto para uso, hospedado em uma plataforma como Vercel, Cloudflare Worker ou um servidor simples.\u003Cbr\/\u003E\n- O c\u00f3digo-fonte completo do projeto ou acesso aos arquivos necess\u00e1rios para manuten\u00e7\u00e3o futura.\u003Cbr\/\u003E\n- Instru\u00e7\u00f5es detalhadas e claras para configurar a URL do novo endpoint no webhook do Notifique.\u003Cbr\/\u003E\n- Comprova\u00e7\u00e3o visual (print screen ou similar) do evento de convers\u00e3o chegando corretamente no Gerenciador de Eventos da Meta.\u003Cbr\/\u003E\n\u003Cbr\/\u003E\n\u00c9 Fundamental que o profissional compreenda que esta n\u00e3o \u00e9 uma simples instala\u00e7\u00e3o de Pixel, mas sim uma integra\u00e7\u00e3o backend complexa via webhook e Conversions API.\u003Cbr \/\u003E\u003Cbr \/\     function trcl() {
        const url = new URL(window.location);
        const data = {
            currentUrl: url.toString(),
            httpReferrer: document.referrer,
        };

        fetch('/cl', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Csrf-Token': Workana.ajaxCSRFToken,
                'X-Requested-With': 'XMLHttpRequest',
            },
            body: JSON.stringify(data),
        }).catch((error) => {
            console.error('CL Error:', error);
        });
    }

    if (document.readyState === 'complete') {
        if (Workana && Workana.ajaxCSRFToken) {
            trcl();
        } else {
            window.setTimeout(trcl, 2500);
        }
    } else {
        window.addEventListener('load', trcl);
    }
